<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <style>
    * {
      box-sizing: border-box;
    }

    body {

      background: #fff7cf;
      color: #0f1c33;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif;
    }

    main {
      width: min(90vw, 520px);
      padding: 40px 28px;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 14px 38px rgba(15, 28, 51, .16);
      text-align: center;

    h1 {
      margin: 0 0 16px;
      font-size: clamp(28px, 7vw, 42px);
      letter-spacing: 0;
    }

    p {
      margin: 0 0 28px;
      font-size: 16px;
      line-height: 1.8;

      color: #fff;
      background: #ff7a00;
      border-radius: 999px;
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;

      font-weight: 700;
