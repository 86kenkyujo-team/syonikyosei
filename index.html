<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お子さんのための矯正治療 | 小児矯正</title>
  <meta name="description" content="お子さんのための矯正治療。選べる2つの小児矯正とWEB予約のご案内です。">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f7f7f4;
      color: #243044;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      padding-bottom: 0;
      overflow-x: hidden;
    }

    .lp-shell {
      width: min(100vw, 390px);
      background: #fff;
      box-shadow: 0 0 28px rgba(30, 41, 59, .12);
      line-height: 0;
    }

    .lp-section {
      position: relative;
    }

    .lp-image {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hotspot {
      position: absolute;
      display: block;
      border-radius: 999px;
      text-indent: -9999px;
      overflow: hidden;
      z-index: 2;
    }

    .hotspot:focus-visible {
      outline: 3px solid rgba(36, 48, 68, .35);
      outline-offset: 4px;
    }

    .hotspot.top-cta {
      left: 5.3%;
      top: 37.1%;
      width: 67.4%;
      height: 10%;
    }

    .hotspot.final-cta {
      left: 5.8%;
      top: 82.5%;
      width: 88.4%;
      height: 11.8%;
    }

    .sticky-reservation {
      position: fixed;
      left: 50%;
      bottom: 12px;
      z-index: 10;
      width: min(calc(100vw - 24px), 366px);
      min-height: 58px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 22px;
      border: 3px solid #fff;
      border-radius: 999px;
      background: linear-gradient(180deg, #ff9a1f 0%, #ff6b00 100%);
      box-shadow: 0 10px 24px rgba(217, 91, 0, .34);
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.2;
      text-decoration: none;
      transform: translateX(-50%);
    }

    .sticky-reservation::before {
      content: "";
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
      border: 3px solid currentColor;
      border-radius: 4px;
      background:
        linear-gradient(currentColor, currentColor) 4px 8px / 4px 4px no-repeat,
        linear-gradient(currentColor, currentColor) 10px 8px / 4px 4px no-repeat,
        linear-gradient(currentColor, currentColor) 16px 8px / 4px 4px no-repeat,
        linear-gradient(currentColor, currentColor) 4px 15px / 4px 4px no-repeat,
        linear-gradient(currentColor, currentColor) 10px 15px / 4px 4px no-repeat,
        linear-gradient(currentColor, currentColor) 16px 15px / 4px 4px no-repeat,
        linear-gradient(currentColor, currentColor) 0 5px / 100% 3px no-repeat;
    }

    .sticky-reservation::after {
      content: "›";
      font-size: 34px;
      line-height: .7;
      transform: translateY(-1px);
    }

    .sticky-reservation:focus-visible {
      outline: 3px solid rgba(36, 48, 68, .35);
      outline-offset: 4px;
    }

    .sr-copy {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 390px) {
      body {
        padding-bottom: 86px;
      }

      .lp-shell {
        width: 100vw;
        box-shadow: none;
      }

      .sticky-reservation {
        display: inline-flex;
      }
    }
  </style>
</head>
<body>
  <main class="lp-shell" aria-labelledby="lp-title">
    <section class="lp-section">
      <img class="lp-image" src="assets/images/section-01-hero.png" alt="お子さんのための矯正治療。選べる2つの小児矯正、WEB予約はこちら。お子様の歯並びのお悩みと小児矯正を早期に始めるメリットを掲載しています。">
      <a class="hotspot top-cta" href="reservation.html" aria-label="WEB予約はこちら">WEB予約はこちら</a>
    </section>

    <section class="lp-section">
      <img class="lp-image" src="assets/images/section-02-benefits.png" alt="小児矯正を早期に始めるメリット、いつから始めるか、治療の選択肢を掲載しています。">
    </section>

    <section class="lp-section">
      <img class="lp-image" src="assets/images/section-03-message-cta.png" alt="今週の予約空き状況と治療完了までの流れを掲載しています。">
    </section>

    <section class="lp-section">
      <img class="lp-image" src="assets/images/section-04-price.jpg" alt="料金体系と医療費控除を掲載しています。">
    </section>

    <section class="lp-section">
      <img class="lp-image" src="assets/images/section-05-flow.png" alt="当院からのメッセージ、当院が選ばれる理由、WEB予約はこちら。">
      <a class="hotspot final-cta" href="reservation.html" aria-label="WEB予約はこちら">WEB予約はこちら</a>
    </section>

    <section class="sr-copy" aria-label="LP内容">
      <h1 id="lp-title">お子さんのための矯正治療</h1>
      <p>選べる2つの小児矯正。お子様の歯並びのお悩み、早期に始めるメリット、治療の選択肢、当院からのメッセージ、料金体系と医療費控除、予約空き状況、治療完了までの流れを掲載しています。</p>
    </section>
  </main>
  <a class="sticky-reservation" href="reservation.html" aria-label="WEB予約はこちら">WEB予約はこちら</a>
</body>
</html>
