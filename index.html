<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小児矯正相談 | さくら歯科</title>
  <meta name="description" content="さくら歯科の小児矯正専門サイト。お子さまの歯並び相談と無料検査診断のご案内です。">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f7f7f4;
      color: #243044;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      padding-bottom: 0;
      overflow-x: hidden;
    }

    .lp-shell {
      width: min(100vw, 941px);
      background: #fff;
      box-shadow: 0 0 28px rgba(30, 41, 59, .12);
      line-height: 0;
    }

    .lp-section {
      position: relative;
    }

    .lp-image {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hotspot {
      position: absolute;
      display: block;
      border-radius: 999px;
      text-indent: -9999px;
      overflow: hidden;
      z-index: 2;
    }

    .hotspot:focus-visible {
      outline: 3px solid rgba(36, 48, 68, .35);
      outline-offset: 4px;
    }

    .hotspot.cta-01 {
      left: 3.6%;
      top: 87.4%;
      width: 92.8%;
      height: 9.5%;
    }

    .hotspot.cta-06 {
      left: 4.7%;
      top: 84.5%;
      width: 90.6%;
      height: 10.5%;
    }

    .hotspot.cta-09 {
      left: 4.7%;
      top: 86.4%;
      width: 90.6%;
      height: 8.2%;
    }

    .hotspot.cta-11 {
      left: 3.4%;
      top: 88.5%;
      width: 93.2%;
      height: 8.8%;
    }

    .sticky-reservation {
      position: fixed;
      left: 50%;
      bottom: 12px;
      z-index: 10;
      width: min(calc(100vw - 24px), 366px);
      min-height: 58px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 22px;
      border: 3px solid #fff;
      border-radius: 999px;
      background: linear-gradient(180deg, #ff9a1f 0%, #ff6b00 100%);
      box-shadow: 0 10px 24px rgba(217, 91, 0, .34);
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.2;
      text-decoration: none;
      transform: translateX(-50%);
    }

    .sticky-reservation::before {
      content: "";
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
      border: 3px solid currentColor;
      border-radius: 4px;
      background:
        linear-gradient(currentColor, currentColor) 4px 8px / 4px 4px no-repeat,
        linear-gradient(currentColor, currentColor) 10px 8px / 4px 4px no-repeat,
        linear-gradient(currentColor, currentColor) 16px 8px / 4px 4px no-repeat,
        linear-gradient(currentColor, currentColor) 4px 15px / 4px 4px no-repeat,
        linear-gradient(currentColor, currentColor) 10px 15px / 4px 4px no-repeat,
        linear-gradient(currentColor, currentColor) 16px 15px / 4px 4px no-repeat,
        linear-gradient(currentColor, currentColor) 0 5px / 100% 3px no-repeat;
    }

    .sticky-reservation::after {
      content: "›";
      font-size: 34px;
      line-height: .7;
      transform: translateY(-1px);
    }

    .sticky-reservation:focus-visible {
      outline: 3px solid rgba(36, 48, 68, .35);
      outline-offset: 4px;
    }

    .sr-copy {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 390px) {
      body {
        padding-bottom: 86px;
      }

      .lp-shell {
        width: 100vw;
        box-shadow: none;
      }

      .sticky-reservation {
        display: inline-flex;
      }
    }
  </style>
</head>
<body>
  <main class="lp-shell" aria-labelledby="lp-title">
    <section class="lp-section">
      <img class="lp-image" src="assets/images/lp-01.png" alt="さくら歯科小児専門サイト。お子さまの歯並びをそのままにしていませんか。5歳から12歳のお子さまにおすすめのやさしい小児矯正と、無料検査診断、WEB予約の案内です。">
      <a class="hotspot cta-01" href="reservation.html" aria-label="WEB予約はこちら">WEB予約はこちら</a>
    </section>

    <section class="lp-section">
      <img class="lp-image" src="assets/images/lp-02.png" alt="こんなお悩みありませんか。歯並びのお悩みと癖・生活習慣のお悩みを掲載しています。">
    </section>

    <section class="lp-section">
      <img class="lp-image" src="assets/images/lp-03.png" alt="歯並びや癖を放置すると起こりやすいこと。永久歯のスペース不足、出っ歯や受け口、噛み合わせ、口呼吸、虫歯や歯周トラブル、発音や食べ方への影響を説明しています。">
    </section>

    <section class="lp-section">
      <img class="lp-image" src="assets/images/lp-04.png" alt="ワイヤーではない矯正として、透明で目立ちにくいマウスピース型矯正インビザライン・ファーストを紹介しています。">
    </section>

    <section class="lp-section">
      <img class="lp-image" src="assets/images/lp-05.png" alt="プレオルソ。お口の癖にもアプローチする子ども向けマウスピースについて説明しています。">
    </section>

    <section class="lp-section">
      <img class="lp-image" src="assets/images/lp-06.png" alt="保護者の方へ。通常33,000円の検査診断料が無料。今の歯並びの状態、矯正の必要性、始める時期、マウスピース矯正が合うか、費用や期間の目安を確認できます。">
      <a class="hotspot cta-06" href="reservation.html" aria-label="無料検査診断を予約する">無料検査診断を予約する</a>
    </section>

    <section class="lp-section">
      <img class="lp-image" src="assets/images/lp-07.png" alt="小児矯正を始める時期。5歳ごろから相談でき、5歳から12歳ごろがおすすめです。">
    </section>

    <section class="lp-section">
      <img class="lp-image" src="assets/images/lp-08.png" alt="小児矯正とは。子どもの成長を利用して、歯並びと噛み合わせを整える治療です。">
    </section>

    <section class="lp-section">
      <img class="lp-image" src="assets/images/lp-09.png" alt="保護者の方へ。きれいな歯並びは子どもへの最高のプレゼントです。通常33,000円の検査診断料が無料で、歯並びの状態や矯正の必要性、始める時期、費用や期間の目安を確認できます。">
      <a class="hotspot cta-09" href="reservation.html" aria-label="無料検査診断を予約する">無料検査診断を予約する</a>
    </section>

    <section class="lp-section">
      <img class="lp-image" src="assets/images/lp-10.png" alt="さくら歯科について。お子さまの歯並び相談に対応しています。医院外観、院内の雰囲気、医院の場所、診療時間を掲載しています。">
    </section>

    <section class="lp-section">
      <img class="lp-image" src="assets/images/lp-11.png" alt="お子さまの歯並びが気になった今が相談のタイミングです。矯正の必要性や費用への不安がある方へ、無料検査診断とWEB予約の案内です。">
      <a class="hotspot cta-11" href="reservation.html" aria-label="WEB予約はこちら">WEB予約はこちら</a>
    </section>

    <section class="sr-copy" aria-label="LP内容">
      <h1 id="lp-title">さくら歯科 小児矯正相談</h1>
      <p>歯並びのお悩み、癖や生活習慣のお悩み、放置した場合のリスク、インビザライン・ファースト、プレオルソ、無料検査診断、始める時期、小児矯正の説明、医院案内、診療時間を掲載しています。</p>
    </section>
  </main>
  <a class="sticky-reservation" href="reservation.html" aria-label="WEB予約はこちら">WEB予約はこちら</a>
</body>
</html>
